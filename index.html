<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AAURSI • ACCESS-X25</title>

<style>
* {
  transition: all 0.3s ease;
}

body {
  background: #050505;
  color: #33ff33;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  margin: 0;
}

#box {
  width: 600px;
  border: 1px solid #33ff33;
  padding: 20px;
  background: #0a0a0a;
  box-shadow: 0 0 20px rgba(51, 255, 51, 0.3);
  animation: boxGlow 3s infinite alternate;
}

@keyframes boxGlow {
  from { box-shadow: 0 0 20px rgba(51, 255, 51, 0.3); }
  to { box-shadow: 0 0 40px rgba(51, 255, 51, 0.6); }
}

h2 { 
  text-align: center;
  text-shadow: 0 0 10px #33ff33;
  margin: 0 0 20px 0;
  font-size: 28px;
  letter-spacing: 2px;
}

input {
  width: 100%;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  margin-bottom: 10px;
  box-sizing: border-box;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  box-shadow: 0 0 10px #33ff33 inset;
  background: #0a2a0a;
}

button {
  width: 100%;
  background: #33ff33;
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
  margin-bottom: 5px;
}

button:hover {
  background: #55ff55;
  box-shadow: 0 0 15px #33ff33;
  transform: scale(1.02);
}

button:active {
  transform: scale(0.98);
}

.button-group {
  display: flex;
  gap: 10px;
}

.button-group button {
  flex: 1;
  margin-bottom: 0;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
  animation: slideIn 0.5s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.module {
  border: 1px solid #33ff33;
  padding: 15px;
  cursor: pointer;
  text-align: center;
  background: #0a0a0a;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.module::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(51, 255, 51, 0.1);
  transition: left 0.3s ease;
  z-index: -1;
}

.module:hover::before {
  left: 0;
}

.module:hover {
  background: #1a1a1a;
  box-shadow: 0 0 15px #33ff33;
  transform: translateY(-3px);
}

.module:active {
  transform: translateY(0);
}

.module.active {
  border-color: #55ff55;
  box-shadow: 0 0 20px #33ff33;
  background: #0a2a0a;
}

#content {
  margin-top: 15px;
  white-space: pre-wrap;
  min-height: 200px;
  max-height: 400px;
  border: 1px solid #33ff33;
  padding: 10px;
  background: #0a0a0a;
  overflow-y: auto;
  animation: fadeIn 0.4s ease;
  position: relative;
}

#content::-webkit-scrollbar {
  width: 8px;
}

#content::-webkit-scrollbar-track {
  background: #0a0a0a;
}

#content::-webkit-scrollbar-thumb {
  background: #33ff33;
  border-radius: 4px;
}

#content::-webkit-scrollbar-thumb:hover {
  background: #55ff55;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scanlines {
  0% { transform: translateY(0); }
  100% { transform: translateY(10px); }
}

.scanline {
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(51, 255, 51, 0.5), transparent);
  animation: scanlines 0.1s infinite;
  pointer-events: none;
}

.alert { color: #ff3333; }
.success { color: #33ff33; }
.warning { color: #ffaa33; }
.info { color: #3399ff; }

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  border-bottom: 1px solid #33ff33;
  padding-bottom: 10px;
  animation: slideIn 0.5s ease;
  align-items: center;
}

.user-info {
  color: #33ff33;
  font-size: 14px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.logout-btn {
  width: 120px;
  padding: 8px;
  font-size: 12px;
  margin: 0;
}

.section-title {
  color: #ffaa33;
  margin: 15px 0 10px 0;
  padding-bottom: 8px;
  border-bottom: 1px solid #ffaa33;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.data-row {
  margin: 8px 0;
  padding: 8px;
  border-left: 3px solid #33ff33;
  padding-left: 12px;
  transition: all 0.2s ease;
  cursor: pointer;
}

.data-row:hover {
  border-left-color: #55ff55;
  background: rgba(51, 255, 51, 0.05);
  transform: translateX(5px);
}

.restricted {
  color: #ff3333;
  font-style: italic;
}

.status-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  animation: statusBlink 1s infinite;
}

.status-active {
  background: #33ff33;
}

.status-warning {
  background: #ffaa33;
  animation: statusBlink 0.5s infinite;
}

.status-alert {
  background: #ff3333;
  animation: statusBlink 0.3s infinite;
}

@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.stat-box {
  border: 1px solid #33ff33;
  padding: 10px;
  margin: 10px 0;
  background: rgba(51, 255, 51, 0.05);
  border-radius: 2px;
}

.stat-value {
  font-size: 18px;
  font-weight: bold;
  color: #33ff33;
}

.stat-label {
  font-size: 12px;
  color: #999;
  text-transform: uppercase;
  margin-top: 5px;
}

.interactive-btn {
  display: inline-block;
  padding: 5px 10px;
  margin: 5px 5px 5px 0;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s ease;
}

.interactive-btn:hover {
  background: #33ff33;
  color: black;
  box-shadow: 0 0 10px #33ff33;
}

#panel-main {
  animation: slideIn 0.5s ease;
}

.login-spinner {
  text-align: center;
  font-size: 24px;
  animation: spin 1s linear infinite;
  margin: 10px 0;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Glitch Screen Styles */
#glitch-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #050505;
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#glitch-screen.active {
  display: flex;
}

.glitch-content {
  text-align: center;
  animation: glitchFlicker 0.1s infinite;
}

@keyframes glitchFlicker {
  0%, 100% { text-shadow: 0 0 10px #ff3333, -2px 2px 0 #33ff33, 2px -2px 0 #3399ff; }
  20% { text-shadow: 2px -2px 0 #ff3333, -2px 2px 0 #33ff33, 0 0 10px #3399ff; }
  40% { text-shadow: -2px 2px 0 #ff3333, 0 0 0 #33ff33, 2px -2px 0 #3399ff; }
  60% { text-shadow: 0 0 10px #ff3333, 2px -2px 0 #33ff33, -2px 2px 0 #3399ff; }
  80% { text-shadow: -2px 2px 0 #ff3333, 2px -2px 0 #33ff33, 0 0 10px #3399ff; }
}

.glitch-text {
  font-size: 32px;
  color: #ff3333;
  margin-bottom: 20px;
  font-weight: bold;
  letter-spacing: 3px;
}

.glitch-warning {
  font-size: 14px;
  color: #ffaa33;
  margin-bottom: 30px;
  max-width: 400px;
}

.glitch-checkbox {
  margin: 20px 0;
}

.glitch-checkbox input {
  width: auto;
  margin-right: 10px;
}

.glitch-checkbox label {
  color: #33ff33;
  font-size: 12px;
}

.glitch-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.glitch-buttons button {
  width: 150px;
  padding: 10px;
  background: #33ff33;
  color: black;
  border: 1px solid #33ff33;
  cursor: pointer;
  font-weight: bold;
  font-family: monospace;
  transition: all 0.2s;
}

.glitch-buttons button:hover {
  background: #55ff55;
  box-shadow: 0 0 15px #33ff33;
}

.glitch-buttons button:disabled {
  background: #444;
  color: #666;
  cursor: not-allowed;
  opacity: 0.5;
}

.glitch-timer {
  font-size: 12px;
  color: #3399ff;
  margin-top: 20px;
}

/* Beta Tag */
.beta-tag {
  display: inline-block;
  padding: 2px 8px;
  background: #ffaa33;
  color: black;
  font-size: 10px;
  font-weight: bold;
  border-radius: 2px;
  margin-left: 5px;
}

/* Restricted Content */
.module.restricted-module {
  opacity: 0.5;
  pointer-events: none;
}

.restricted-module:hover {
  background: #0a0a0a;
  box-shadow: 0 0 10px #ff3333;
}
</style>
</head>

<body>

<div id="box">
  <h2>ACCESS-X25</h2>

  <div id="login-form">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    
    <div class="button-group">
      <button onclick="login()">Connexion</button>
      <button onclick="showGlitchScreen()" style="background: #ffaa33; color: black;">S'inscrire</button>
    </div>

    <div id="log"></div>
  </div>

  <div id="panel-main" style="display: none;">
    <div class="header">
      <div class="user-info">👤 <span id="logged-user"></span></div>
      <button class="logout-btn" onclick="logout()">🚪 Déconnexion</button>
    </div>

    <div class="menu">
      <div class="module" data-module="ops" onclick="openModule(this, 'ops')">📂 Opérations</div>
      <div class="module" data-module="missions" onclick="openModule(this, 'missions')">🎯 Missions</div>
      <div class="module" data-module="intelligence" onclick="openModule(this, 'intelligence')">🔍 Intelligence</div>
      <div class="module" data-module="comms" onclick="openModule(this, 'comms')">📡 Comms</div>
      <div class="module" data-module="notes" onclick="openModule(this, 'notes')">🧠 Notes</div>
      <div class="module" data-module="logs" onclick="openModule(this, 'logs')">📋 Logs</div>
      <div class="module" data-module="profile" onclick="openModule(this, 'profile')">👥 Profil</div>
      <div class="module" data-module="settings" onclick="openModule(this, 'settings')">⚙️ Paramètres</div>
    </div>

    <div id="content"></div>
  </div>
</div>

<!-- Glitch Screen for Registration -->
<div id="glitch-screen">
  <div class="glitch-content">
    <div class="glitch-text">⚠️ DANGER ⚠️</div>
    <div class="glitch-warning">
      VOUS ÊTES SUR LE POINT D'ACCÉDER À UN SYSTÈME CLASSIFIÉ.<br>
      CETTE ACTION EST ENREGISTRÉE ET SURVEILLÉE.<br>
      CONFIRMEZ-VOUS VOTRE IDENTITÉ ?
    </div>
    
    <div class="glitch-checkbox">
      <input type="checkbox" id="accept-terms">
      <label for="accept-terms">J'accepte les conditions de sécurité</label>
    </div>
    
    <div class="glitch-buttons">
      <button onclick="sendRegistrationEmail()" id="startBtn" disabled>C'EST PARTI !</button>
      <button onclick="cancelRegistration()" style="background: #ff3333; border-color: #ff3333;">ANNULER</button>
    </div>
    
    <div class="glitch-timer">
      <span id="timer"></span>
    </div>
  </div>
</div>

<script>
let glitchTimer = null;
let registrationSent = false;

const USERS = {
  "Dr Zed": {
    pass: "aaursi",
    type: "zed",
    clearance: "ALPHA"
  },
  "Dr Melquenn": {
    pass: "melina",
    type: "ix",
    clearance: "BETA"
  }
};

let attempts = 0;
let currentUser = null;
let currentType = null;
let currentClearance = null;
let currentModule = null;

// Add scanlines effect
function addScanlines() {
  const content = document.getElementById("content");
  if (content.querySelector('.scanline')) return;
  
  for (let i = 0; i < 5; i++) {
    const scanline = document.createElement('div');
    scanline.className = 'scanline';
    scanline.style.top = Math.random() * 100 + '%';
    content.appendChild(scanline);
  }
}

function showGlitchScreen() {
  const glitchScreen = document.getElementById('glitch-screen');
  glitchScreen.classList.add('active');
  
  document.getElementById('accept-terms').checked = false;
  document.getElementById('startBtn').disabled = true;
  registrationSent = false;
  
  let timeLeft = 5;
  updateTimer(timeLeft);
  
  glitchTimer = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    
    if (timeLeft <= 0) {
      clearInterval(glitchTimer);
      document.getElementById('startBtn').disabled = false;
    }
  }, 1000);
}

function updateTimer(timeLeft) {
  if (timeLeft > 0) {
    document.getElementById('timer').textContent = `Accès disponible dans: ${timeLeft}s`;
  } else {
    document.getElementById('timer').textContent = `✓ Vous pouvez procéder`;
  }
}

function cancelRegistration() {
  document.getElementById('glitch-screen').classList.remove('active');
  if (glitchTimer) clearInterval(glitchTimer);
}

function sendRegistrationEmail() {
  if (!document.getElementById('accept-terms').checked) {
    alert('Vous devez accepter les conditions');
    return;
  }
  
  registrationSent = true;
  window.location.href = 'mailto:niz-official1@proton.me?subject=Demande d\'accès ACCESS-X25&body=Je souhaite accéder au système ACCESS-X25.%0A%0AEn attente de validation par Dr Zed.';
  
  setTimeout(() => {
    document.getElementById('glitch-screen').classList.remove('active');
    document.getElementById('log').innerHTML = "<span class='success'>✓ Demande envoyée — Dr Zed validera ta demande</span>";
    
    if (glitchTimer) clearInterval(glitchTimer);
  }, 500);
}

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;
  const log = document.getElementById("log");

  if (!u || !p) {
    log.innerHTML = "<span class='alert'>⚠️ Champs requis</span>";
    return;
  }

  log.innerHTML = "<div class='login-spinner'>⟳</div>";

  setTimeout(() => {
    if (USERS[u] && USERS[u].pass === p) {
      currentUser = u;
      currentType = USERS[u].type;
      currentClearance = USERS[u].clearance;
      loadPanel(u, currentType);
      attempts = 0;
    } else {
      attempts++;

      if (attempts === 1) {
        log.innerHTML = "<span class='alert'>⚠️ Analyse en cours...</span>";
      } else if (attempts === 2) {
        log.innerHTML = "<span class='alert'>⚠️ Anomalie comportementale détectée.</span>";
      } else {
        log.innerHTML = "<span class='alert'>🔒 Session surveillée — VX</span>";
      }
    }
  }, 1500);
}

function logout() {
  document.getElementById("login-form").style.display = "block";
  document.getElementById("panel-main").style.display = "none";
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  document.getElementById("log").innerHTML = "";
  currentUser = null;
  currentType = null;
  currentClearance = null;
  currentModule = null;
  attempts = 0;
  
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
}

function loadPanel(user, type) {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("panel-main").style.display = "block";
  const clearanceText = USERS[user].clearance === "BETA" ? `${USERS[user].clearance} <span class='beta-tag'>ACCÈS LIMITÉ</span>` : USERS[user].clearance;
  document.getElementById("logged-user").innerHTML = user + " [" + clearanceText + "]";
  
  setTimeout(() => {
    const firstModule = document.querySelector('.module');
    openModule(firstModule, 'ops');
  }, 300);
}

function openModule(element, mod) {
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  
  if (element) element.classList.add('active');
  
  currentModule = mod;
  const c = document.getElementById("content");
  
  c.innerHTML = '';

  if (mod === "ops") {
    let ops = "<div class='section-title'>📂 OPÉRATIONS EN COURS</div>";
    ops += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>OP-442</span> : Surveillance Point A - <span class='success'>ACTIVE</span></div>";
    ops += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>OP-778</span> : Analyse VX - <span class='success'>ACTIVE</span></div>";
    ops += "<div class='data-row'><span class='status-indicator status-warning'></span><span class='info'>OP-990</span> : Accès restreint - " + 
           (currentClearance === "ALPHA" ? "<span class='success'>DÉBLOQUÉ</span>" : "<span class='restricted'>CLASSIFIÉ</span>") + "</div>";
    ops += "<div class='data-row'><span class='status-indicator status-warning'></span><span class='info'>OP-556</span> : Sécurité Périmètre - <span class='success'>ACTIVE</span></div>";
    
    ops += "<div class='stat-box'>";
    ops += "<div class='stat-label'>Opérations Actives</div>";
    ops += "<div class='stat-value'>" + (currentClearance === "ALPHA" ? "7 / 12" : "4 / 12") + "</div>";
    ops += "</div>";
    
    if (currentClearance === "ALPHA") {
      ops += "<div class='data-row' style='margin-top: 10px; border-left-color: #ffaa33;'><span class='status-indicator status-alert'></span><span class='warning'>[CLASSIFIÉ]</span> OP-VX-CORE : Interdiction brèche sys</div>";
      ops += "<div class='data-row' style='border-left-color: #ffaa33;'><span class='status-indicator status-alert'></span><span class='warning'>[CLASSIFIÉ]</span> OP-SHADOW-X : Moniteur externe</div>";
      ops += "<div class='stat-box'>";
      ops += "<div class='stat-label'>Clearance ALPHA</div>";
      ops += "<div class='stat-value'>ACCÈS COMPLET</div>";
      ops += "</div>";
    } else {
      ops += "<div class='stat-box'>";
      ops += "<div class='stat-label'>Clearance BETA</div>";
      ops += "<div class='stat-value'>ACCÈS PARTIEL</div>";
      ops += "</div>";
    }
    
    c.innerHTML = ops;
  }

  else if (mod === "missions") {
    let missions = "<div class='section-title'>🎯 MISSIONS ASSIGNÉES</div>";
    
    if (currentType === "ix") {
      missions += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>MISSION-Δ19</span>";
      missions += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      missions += "État : <span class='success'>ACTIVE</span><br>";
      missions += "Priorité : <span class='alert'>CRITIQUE</span><br>";
      missions += "Cible : Analyse VX-CORE<br>";
      missions += "Progression : <span class='success'>60%</span><br>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Données collectées avec succès\")'>Détails</button>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Marquez comme complétée\")'>Valider</button>";
      missions += "</div></div>";
      
      missions += "<div class='data-row'><span class='status-indicator status-warning'></span><span class='info'>MISSION-VX-SHADOW</span>";
      missions += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      missions += "État : <span class='warning'>EN COURS</span><br>";
      missions += "Priorité : <span class='warning'>HAUTE</span><br>";
      missions += "Détails : <span class='restricted'>[ DONNÉES CHIFFRÉES ]</span><br>";
      missions += "Progression : <span class='warning'>35%</span><br>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Accès aux données chiffrées\")'>Déchiffrer</button>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Impossible — Clearance insuffisante\")'>Rapport</button>";
      missions += "</div></div>";
      
      missions += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>MISSION-SURVEY-08</span>";
      missions += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      missions += "État : <span class='info'>À FAIRE</span><br>";
      missions += "Priorité : <span class='info'>NORMALE</span><br>";
      missions += "Cible : Inspection Zone Theta<br>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Acceptée\")'>Accepter</button>";
      missions += "</div></div>";
    } else {
      missions += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>MISSION-ZED-01</span>";
      missions += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      missions += "État : <span class='success'>ACTIVE</span><br>";
      missions += "Priorité : <span class='info'>NORMALE</span><br>";
      missions += "Sujet : Maintien Protocole Point A<br>";
      missions += "Progression : <span class='success'>100%</span><br>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Statut OK — Système stable\")'>Vérifier</button>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Rapport généré\")'>Rapport</button>";
      missions += "</div></div>";
      
      missions += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>MISSION-ALPHA-05</span>";
      missions += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      missions += "État : <span class='success'>ACTIVE</span><br>";
      missions += "Priorité : <span class='warning'>HAUTE</span><br>";
      missions += "Sujet : Calibration Équipement Secteur 4<br>";
      missions += "Progression : <span class='warning'>45%</span><br>";
      missions += "<button class='interactive-btn' onclick='alert(\"Mission: Données téléchargées\")'>Continuer</button>";
      missions += "</div></div>";
    }
    
    missions += "<div class='stat-box'>";
    missions += "<div class='stat-label'>Missions Complétées</div>";
    missions += "<div class='stat-value'>" + (currentType === "ix" ? "12 / 15" : "8 / 12") + "</div>";
    missions += "</div>";
    
    c.innerHTML = missions;
  }

  else if (mod === "intelligence") {
