<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AAURSI • ACCESS-X25</title>

<style>
* {
  transition: all 0.3s ease;
}

body {
  background: #050505;
  color: #33ff33;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  margin: 0;
}

#box {
  width: 600px;
  border: 1px solid #33ff33;
  padding: 20px;
  background: #0a0a0a;
  box-shadow: 0 0 20px rgba(51, 255, 51, 0.3);
  animation: boxGlow 3s infinite alternate;
}

@keyframes boxGlow {
  from { box-shadow: 0 0 20px rgba(51, 255, 51, 0.3); }
  to { box-shadow: 0 0 40px rgba(51, 255, 51, 0.6); }
}

h2 { 
  text-align: center;
  text-shadow: 0 0 10px #33ff33;
  margin: 0 0 20px 0;
  font-size: 28px;
  letter-spacing: 2px;
}

input {
  width: 100%;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  margin-bottom: 10px;
  box-sizing: border-box;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  box-shadow: 0 0 10px #33ff33 inset;
  background: #0a2a0a;
}

button {
  width: 100%;
  background: #33ff33;
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
  margin-bottom: 5px;
}

button:hover {
  background: #55ff55;
  box-shadow: 0 0 15px #33ff33;
  transform: scale(1.02);
}

button:active {
  transform: scale(0.98);
}

.button-group {
  display: flex;
  gap: 10px;
}

.button-group button {
  flex: 1;
  margin-bottom: 0;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
  animation: slideIn 0.5s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.module {
  border: 1px solid #33ff33;
  padding: 15px;
  cursor: pointer;
  text-align: center;
  background: #0a0a0a;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.module::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(51, 255, 51, 0.1);
  transition: left 0.3s ease;
  z-index: -1;
}

.module:hover::before {
  left: 0;
}

.module:hover {
  background: #1a1a1a;
  box-shadow: 0 0 15px #33ff33;
  transform: translateY(-3px);
}

.module:active {
  transform: translateY(0);
}

.module.active {
  border-color: #55ff55;
  box-shadow: 0 0 20px #33ff33;
  background: #0a2a0a;
}

#content {
  margin-top: 15px;
  white-space: pre-wrap;
  word-wrap: break-word;
  min-height: 200px;
  max-height: 400px;
  border: 1px solid #33ff33;
  padding: 10px;
  background: #0a0a0a;
  overflow-y: auto;
  animation: fadeIn 0.4s ease;
  position: relative;
}

#content::-webkit-scrollbar {
  width: 8px;
}

#content::-webkit-scrollbar-track {
  background: #0a0a0a;
}

#content::-webkit-scrollbar-thumb {
  background: #33ff33;
  border-radius: 4px;
}

#content::-webkit-scrollbar-thumb:hover {
  background: #55ff55;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.alert { color: #ff3333; }
.success { color: #33ff33; }
.warning { color: #ffaa33; }
.info { color: #3399ff; }

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  border-bottom: 1px solid #33ff33;
  padding-bottom: 10px;
  animation: slideIn 0.5s ease;
  align-items: center;
}

.user-info {
  color: #33ff33;
  font-size: 14px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.logout-btn {
  width: 120px;
  padding: 8px;
  font-size: 12px;
  margin: 0;
}

.section-title {
  color: #ffaa33;
  margin: 15px 0 10px 0;
  padding-bottom: 8px;
  border-bottom: 1px solid #ffaa33;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.data-row {
  margin: 8px 0;
  padding: 8px;
  border-left: 3px solid #33ff33;
  padding-left: 12px;
  transition: all 0.2s ease;
  cursor: pointer;
}

.data-row:hover {
  border-left-color: #55ff55;
  background: rgba(51, 255, 51, 0.05);
  transform: translateX(5px);
}

.restricted {
  color: #ff3333;
  font-style: italic;
}

.status-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  animation: statusBlink 1s infinite;
}

.status-active {
  background: #33ff33;
}

.status-warning {
  background: #ffaa33;
  animation: statusBlink 0.5s infinite;
}

.status-alert {
  background: #ff3333;
  animation: statusBlink 0.3s infinite;
}

@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.stat-box {
  border: 1px solid #33ff33;
  padding: 10px;
  margin: 10px 0;
  background: rgba(51, 255, 51, 0.05);
  border-radius: 2px;
}

.stat-value {
  font-size: 18px;
  font-weight: bold;
  color: #33ff33;
}

.stat-label {
  font-size: 12px;
  color: #999;
  text-transform: uppercase;
  margin-top: 5px;
}

.interactive-btn {
  display: inline-block;
  padding: 5px 10px;
  margin: 5px 5px 5px 0;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s ease;
  font-family: monospace;
}

.interactive-btn:hover {
  background: #33ff33;
  color: black;
  box-shadow: 0 0 10px #33ff33;
}

.interactive-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#panel-main {
  animation: slideIn 0.5s ease;
}

.login-spinner {
  text-align: center;
  font-size: 24px;
  animation: spin 1s linear infinite;
  margin: 10px 0;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#glitch-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #050505;
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#glitch-screen.active {
  display: flex;
}

.glitch-content {
  text-align: center;
  animation: glitchFlicker 0.1s infinite;
}

@keyframes glitchFlicker {
  0%, 100% { text-shadow: 0 0 10px #ff3333, -2px 2px 0 #33ff33, 2px -2px 0 #3399ff; }
  20% { text-shadow: 2px -2px 0 #ff3333, -2px 2px 0 #33ff33, 0 0 10px #3399ff; }
  40% { text-shadow: -2px 2px 0 #ff3333, 0 0 0 #33ff33, 2px -2px 0 #3399ff; }
  60% { text-shadow: 0 0 10px #ff3333, 2px -2px 0 #33ff33, -2px 2px 0 #3399ff; }
  80% { text-shadow: -2px 2px 0 #ff3333, 2px -2px 0 #33ff33, 0 0 10px #3399ff; }
}

.glitch-text {
  font-size: 32px;
  color: #ff3333;
  margin-bottom: 20px;
  font-weight: bold;
  letter-spacing: 3px;
}

.glitch-warning {
  font-size: 14px;
  color: #ffaa33;
  margin-bottom: 30px;
  max-width: 400px;
}

.glitch-checkbox {
  margin: 20px 0;
}

.glitch-checkbox input {
  width: auto;
  margin-right: 10px;
}

.glitch-checkbox label {
  color: #33ff33;
  font-size: 12px;
}

.glitch-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.glitch-buttons button {
  width: 150px;
  padding: 10px;
  background: #33ff33;
  color: black;
  border: 1px solid #33ff33;
  cursor: pointer;
  font-weight: bold;
  font-family: monospace;
  transition: all 0.2s;
}

.glitch-buttons button:hover {
  background: #55ff55;
  box-shadow: 0 0 15px #33ff33;
}

.glitch-buttons button:disabled {
  background: #444;
  color: #666;
  cursor: not-allowed;
  opacity: 0.5;
}

.glitch-timer {
  font-size: 12px;
  color: #3399ff;
  margin-top: 20px;
}

.beta-tag {
  display: inline-block;
  padding: 2px 8px;
  background: #ffaa33;
  color: black;
  font-size: 10px;
  font-weight: bold;
  border-radius: 2px;
  margin-left: 5px;
}

.admin-table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 11px;
}

.admin-table th, .admin-table td {
  border: 1px solid #33ff33;
  padding: 8px;
  text-align: left;
  color: #33ff33;
}

.admin-table th {
  background: rgba(51, 255, 51, 0.1);
  font-weight: bold;
}

.admin-table tr:hover {
  background: rgba(51, 255, 51, 0.05);
}

.admin-select {
  background: black;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 4px;
  cursor: pointer;
}

.admin-btn {
  padding: 4px 8px;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.2s;
  font-family: monospace;
  margin: 2px;
}

.admin-btn:hover {
  background: #33ff33;
  color: black;
}

.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 15px;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  border-radius: 2px;
  z-index: 10000;
  animation: slideInRight 0.3s ease;
}

@keyframes slideInRight {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.notification.success { border-color: #33ff33; }
.notification.error { border-color: #ff3333; }
.notification.warning { border-color: #ffaa33; }

.mission-item {
  background: rgba(51, 255, 51, 0.05);
  padding: 10px;
  margin: 8px 0;
  border-left: 3px solid #33ff33;
}

.note-input {
  width: 100%;
  height: 80px;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  box-sizing: border-box;
  margin-bottom: 10px;
  font-family: monospace;
}

.delete-btn {
  background: #ff3333 !important;
  color: white !important;
}

.delete-btn:hover {
  background: #ff5555 !important;
}

.edit-btn {
  background: #3399ff !important;
  color: white !important;
}

.edit-btn:hover {
  background: #55bbff !important;
}

.alpha-tag {
  display: inline-block;
  padding: 2px 8px;
  background: #33ff33;
  color: black;
  font-size: 10px;
  font-weight: bold;
  border-radius: 2px;
  margin-left: 5px;
}

.message-input {
  width: 100%;
  height: 60px;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  box-sizing: border-box;
  margin-bottom: 10px;
  font-family: monospace;
  resize: vertical;
}

.message-item {
  background: rgba(51, 255, 51, 0.05);
  padding: 10px;
  margin: 8px 0;
  border-left: 3px solid #33ff33;
}

.message-from {
  color: #3399ff;
  font-weight: bold;
  font-size: 12px;
}

.message-time {
  color: #999;
  font-size: 10px;
  margin-top: 3px;
}

.message-content {
  color: #33ff33;
  margin-top: 5px;
  word-wrap: break-word;
}

.recipient-select {
  width: 100%;
  background: black;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 8px;
  box-sizing: border-box;
  margin-bottom: 10px;
  font-family: monospace;
  cursor: pointer;
}

.send-btn {
  width: 100%;
  margin-bottom: 0;
}
</style>
</head>

<body>

<div id="box">
  <h2>ACCESS-X25</h2>

  <div id="login-form">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    
    <div class="button-group">
      <button onclick="login()">Connexion</button>
      <button onclick="showGlitchScreen()" style="background: #ffaa33; color: black;">S'inscrire</button>
    </div>

    <div id="log"></div>
  </div>

  <div id="panel-main" style="display: none;">
    <div class="header">
      <div class="user-info">👤 <span id="logged-user"></span></div>
      <button class="logout-btn" onclick="logout()">🚪 Déconnexion</button>
    </div>

    <div class="menu">
      <div class="module" data-module="ops" onclick="openModule(this, 'ops')">📂 Opérations</div>
      <div class="module" data-module="missions" onclick="openModule(this, 'missions')">🎯 Missions</div>
      <div class="module" data-module="intelligence" onclick="openModule(this, 'intelligence')">🔍 Intelligence</div>
      <div class="module" data-module="messages" onclick="openModule(this, 'messages')">💬 Messages</div>
      <div class="module" data-module="notes" onclick="openModule(this, 'notes')">🧠 Notes</div>
      <div class="module" data-module="logs" onclick="openModule(this, 'logs')">📋 Logs</div>
      <div class="module" data-module="profile" onclick="openModule(this, 'profile')">👥 Profil</div>
      <div class="module" data-module="settings" onclick="openModule(this, 'settings')">⚙️ Paramètres</div>
    </div>

    <div id="content"></div>
  </div>
</div>

<!-- Glitch Screen for Registration -->
<div id="glitch-screen">
  <div class="glitch-content">
    <div class="glitch-text">⚠️ DANGER ⚠️</div>
    <div class="glitch-warning">
      VOUS ÊTES SUR LE POINT D'ACCÉDER À UN SYSTÈME CLASSIFIÉ.<br>
      CETTE ACTION EST ENREGISTRÉE ET SURVEILLÉE.<br>
      CONFIRMEZ-VOUS VOTRE IDENTITÉ ?
    </div>
    
    <div class="glitch-checkbox">
      <input type="checkbox" id="accept-terms">
      <label for="accept-terms">J'accepte les conditions de sécurité</label>
    </div>
    
    <div class="glitch-buttons">
      <button onclick="sendRegistrationEmail()" id="startBtn" disabled>C'EST PARTI !</button>
      <button onclick="cancelRegistration()" style="background: #ff3333; border-color: #ff3333;">ANNULER</button>
    </div>
    
    <div class="glitch-timer">
      <span id="timer"></span>
    </div>
  </div>
</div>

<script>
let glitchTimer = null;
let registrationSent = false;

let USERS = {
  "Dr Zed": {
    pass: "aaursi",
    type: "zed",
    clearance: "ALPHA"
  },
  "Dr Melquenn": {
    pass: "melina",
    type: "ix",
    clearance: "BETA"
  }
};

// Data storage for missions, notes, messages, etc
let userData = {};

let attempts = 0;
let currentUser = null;
let currentType = null;
let currentClearance = null;
let currentModule = null;

// Initialize storage
function initStorage() {
  const stored = localStorage.getItem('accessX25Data');
  if (stored) {
    try {
      const data = JSON.parse(stored);
      USERS = data.users || USERS;
      userData = data.userdata || {};
    } catch (e) {
      console.error('Storage error:', e);
    }
  }
  ensureUserData();
}

function ensureUserData() {
  if (!userData[currentUser]) {
    userData[currentUser] = {
      missions: [],
      notes: [],
      messages: [],
      completedMissions: 0,
      missionsData: {
        "MISSION-Δ19": { progress: 60, state: "ACTIVE" },
        "MISSION-VX-SHADOW": { progress: 35, state: "EN COURS" },
        "MISSION-SURVEY-08": { progress: 0, state: "À FAIRE" },
        "MISSION-ZED-01": { progress: 100, state: "ACTIVE" },
        "MISSION-ALPHA-05": { progress: 45, state: "ACTIVE" }
      }
    };
  }
  // Ensure messages array exists
  if (!userData[currentUser].messages) {
    userData[currentUser].messages = [];
  }
}

function saveStorage() {
  localStorage.setItem('accessX25Data', JSON.stringify({
    users: USERS,
    userdata: userData
  }));
}

function showNotification(message, type = 'success') {
  const notif = document.createElement('div');
  notif.className = `notification ${type}`;
  notif.textContent = message;
  document.body.appendChild(notif);
  
  setTimeout(() => {
    notif.style.animation = 'slideInRight 0.3s ease reverse';
    setTimeout(() => notif.remove(), 300);
  }, 3000);
}

function showGlitchScreen() {
  const glitchScreen = document.getElementById('glitch-screen');
  glitchScreen.classList.add('active');
  
  document.getElementById('accept-terms').checked = false;
  document.getElementById('startBtn').disabled = true;
  registrationSent = false;
  
  let timeLeft = 5;
  updateTimer(timeLeft);
  
  glitchTimer = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    
    if (timeLeft <= 0) {
      clearInterval(glitchTimer);
      document.getElementById('startBtn').disabled = false;
    }
  }, 1000);
}

function updateTimer(timeLeft) {
  if (timeLeft > 0) {
    document.getElementById('timer').textContent = `Accès disponible dans: ${timeLeft}s`;
  } else {
    document.getElementById('timer').textContent = `✓ Vous pouvez procéder`;
  }
}

function cancelRegistration() {
  document.getElementById('glitch-screen').classList.remove('active');
  if (glitchTimer) clearInterval(glitchTimer);
}

function sendRegistrationEmail() {
  if (!document.getElementById('accept-terms').checked) {
    alert('Vous devez accepter les conditions');
    return;
  }
  
  registrationSent = true;
  window.location.href = 'mailto:niz-official1@proton.me?subject=Demande d\'accès ACCESS-X25&body=Je souhaite accéder au système ACCESS-X25.%0A%0AEn attente de validation par Dr Zed.';
  
  setTimeout(() => {
    document.getElementById('glitch-screen').classList.remove('active');
    document.getElementById('log').innerHTML = "<span class='success'>✓ Demande envoyée — Dr Zed validera ta demande</span>";
    
    if (glitchTimer) clearInterval(glitchTimer);
  }, 500);
}

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;
  const log = document.getElementById("log");

  if (!u || !p) {
    log.innerHTML = "<span class='alert'>⚠️ Champs requis</span>";
    return;
  }

  log.innerHTML = "<div class='login-spinner'>⟳</div>";

  setTimeout(() => {
    if (USERS[u] && USERS[u].pass === p) {
      currentUser = u;
      currentType = USERS[u].type;
      currentClearance = USERS[u].clearance;
      ensureUserData();
      loadPanel(u, currentType);
      attempts = 0;
    } else {
      attempts++;

      if (attempts === 1) {
        log.innerHTML = "<span class='alert'>⚠️ Analyse en cours...</span>";
      } else if (attempts === 2) {
        log.innerHTML = "<span class='alert'>⚠️ Anomalie comportementale détectée.</span>";
      } else {
        log.innerHTML = "<span class='alert'>🔒 Session surveillée — VX</span>";
      }
    }
  }, 1500);
}

function logout() {
  saveStorage();
  document.getElementById("login-form").style.display = "block";
  document.getElementById("panel-main").style.display = "none";
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  document.getElementById("log").innerHTML = "";
  currentUser = null;
  currentType = null;
  currentClearance = null;
  currentModule = null;
  attempts = 0;
  
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
}

function loadPanel(user, type) {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("panel-main").style.display = "block";
  const clearanceText = USERS[user].clearance === "BETA" ? `${USERS[user].clearance} <span class='beta-tag'>ACCÈS LIMITÉ</span>` : USERS[user].clearance;
  document.getElementById("logged-user").innerHTML = user + " [" + clearanceText + "]";
  
  setTimeout(() => {
    const firstModule = document.querySelector('.module');
    openModule(firstModule, 'ops');
  }, 300);
}

function updateMissionProgress(missionId, newProgress) {
  if (userData[currentUser].missionsData[missionId]) {
    userData[currentUser].missionsData[missionId].progress = newProgress;
    saveStorage();
  }
}

function completeMission(missionId) {
  if (userData[currentUser].missionsData[missionId]) {
    userData[currentUser].missionsData[missionId].progress = 100;
    userData[currentUser].missionsData[missionId].state = "COMPLÉTÉE";
    userData[currentUser].completedMissions = (userData[currentUser].completedMissions || 0) + 1;
    saveStorage();
    showNotification(`Mission ${missionId} complétée!`, 'success');
  }
}

function addNote(content) {
  if (!content.trim()) {
    showNotification('Note vide!', 'warning');
    return;
  }
  userData[currentUser].notes.push({
    id: Date.now(),
    content: content,
    timestamp: new Date().toLocaleString('fr-FR')
  });
  saveStorage();
  showNotification('Note ajoutée', 'success');
  openModule(document.querySelector('[data-module="notes"]'), 'notes');
}

function deleteNote(noteId) {
  userData[currentUser].notes = userData[currentUser].notes.filter(n => n.id !== noteId);
  saveStorage();
  showNotification('Note supprimée', 'success');
  openModule(document.querySelector('[data-module="notes"]'), 'notes');
}

function sendMessage(recipient) {
  const messageContent = document.getElementById('message-input').value;
  
  if (!recipient) {
    showNotification('Sélectionnez un destinataire', 'warning');
    return;
  }
  
  if (!messageContent.trim()) {
    showNotification('Message vide!', 'warning');
    return;
  }
  
  // Store message in recipient's inbox
  if (!userData[recipient]) {
    userData[recipient] = { messages: [], notes: [], missions: [], completedMissions: 0 };
  }
  if (!userData[recipient].messages) {
    userData[recipient].messages = [];
  }
  
  userData[recipient].messages.push({
    id: Date.now(),
    from: currentUser,
    content: messageContent,
    timestamp: new Date().toLocaleString('fr-FR'),
    read: false
  });
  
  // Also store in sender's sent folder
  userData[currentUser].messages.push({
    id: Date.now(),
    to: recipient,
    content: messageContent,
    timestamp: new Date().toLocaleString('fr-FR'),
    type: 'sent'
  });
  
  saveStorage();
  showNotification(`Message envoyé à ${recipient}`, 'success');
  document.getElementById('message-input').value = '';
  openModule(document.querySelector('[data-module="messages"]'), 'messages');
}

function deleteMessage(messageId) {
  userData[currentUser].messages = userData[currentUser].messages.filter(m => m.id !== messageId);
  saveStorage();
  showNotification('Message supprimé', 'success');
  openModule(document.querySelector('[data-module="messages"]'), 'messages');
}

function getOtherUsers() {
  return Object.keys(USERS).filter(user => user !== currentUser);
}

function changeClearance(username, newClearance) {
  if (USERS[username]) {
    USERS[username].clearance = newClearance;
    saveStorage();
    showNotification(`Clearance de ${username} changée à ${newClearance}`, 'success');
    openModule(document.querySelector('[data-module="settings"]'), 'settings');
  }
}

function deleteUser(username) {
  if (username === currentUser) {
    showNotification('Impossible de supprimer le compte actuel', 'error');
    return;
  }
  if (username === "Dr Zed") {
    showNotification('Impossible de supprimer Dr Zed', 'error');
    return;
  }
  delete USERS[username];
  if (userData[username]) delete userData[username];
  saveStorage();
  showNotification(`Utilisateur ${username} supprimé`, 'success');
  openModule(document.querySelector('[data-module="settings"]'), 'settings');
}
