<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AAURSI • ACCESS-X25</title>

<style>
* {
  transition: all 0.3s ease;
}

body {
  background: #050505;
  color: #33ff33;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  margin: 0;
}

#box {
  width: 600px;
  border: 1px solid #33ff33;
  padding: 20px;
  background: #0a0a0a;
  box-shadow: 0 0 20px rgba(51, 255, 51, 0.3);
  animation: boxGlow 3s infinite alternate;
}

@keyframes boxGlow {
  from { box-shadow: 0 0 20px rgba(51, 255, 51, 0.3); }
  to { box-shadow: 0 0 40px rgba(51, 255, 51, 0.6); }
}

h2 { 
  text-align: center;
  text-shadow: 0 0 10px #33ff33;
  margin: 0 0 20px 0;
  font-size: 28px;
  letter-spacing: 2px;
}

input {
  width: 100%;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  margin-bottom: 10px;
  box-sizing: border-box;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  box-shadow: 0 0 10px #33ff33 inset;
  background: #0a2a0a;
}

button {
  width: 100%;
  background: #33ff33;
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
  margin-bottom: 5px;
}

button:hover {
  background: #55ff55;
  box-shadow: 0 0 15px #33ff33;
  transform: scale(1.02);
}

button:active {
  transform: scale(0.98);
}

.button-group {
  display: flex;
  gap: 10px;
}

.button-group button {
  flex: 1;
  margin-bottom: 0;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
  animation: slideIn 0.5s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.module {
  border: 1px solid #33ff33;
  padding: 15px;
  cursor: pointer;
  text-align: center;
  background: #0a0a0a;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.module::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(51, 255, 51, 0.1);
  transition: left 0.3s ease;
  z-index: -1;
}

.module:hover::before {
  left: 0;
}

.module:hover {
  background: #1a1a1a;
  box-shadow: 0 0 15px #33ff33;
  transform: translateY(-3px);
}

.module:active {
  transform: translateY(0);
}

.module.active {
  border-color: #55ff55;
  box-shadow: 0 0 20px #33ff33;
  background: #0a2a0a;
}

#content {
  margin-top: 15px;
  white-space: pre-wrap;
  word-wrap: break-word;
  min-height: 200px;
  max-height: 400px;
  border: 1px solid #33ff33;
  padding: 10px;
  background: #0a0a0a;
  overflow-y: auto;
  animation: fadeIn 0.4s ease;
  position: relative;
}

#content::-webkit-scrollbar {
  width: 8px;
}

#content::-webkit-scrollbar-track {
  background: #0a0a0a;
}

#content::-webkit-scrollbar-thumb {
  background: #33ff33;
  border-radius: 4px;
}

#content::-webkit-scrollbar-thumb:hover {
  background: #55ff55;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.alert { color: #ff3333; }
.success { color: #33ff33; }
.warning { color: #ffaa33; }
.info { color: #3399ff; }

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  border-bottom: 1px solid #33ff33;
  padding-bottom: 10px;
  animation: slideIn 0.5s ease;
  align-items: center;
}

.user-info {
  color: #33ff33;
  font-size: 14px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.logout-btn {
  width: 120px;
  padding: 8px;
  font-size: 12px;
  margin: 0;
}

.section-title {
  color: #ffaa33;
  margin: 15px 0 10px 0;
  padding-bottom: 8px;
  border-bottom: 1px solid #ffaa33;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.data-row {
  margin: 8px 0;
  padding: 8px;
  border-left: 3px solid #33ff33;
  padding-left: 12px;
  transition: all 0.2s ease;
  cursor: pointer;
}

.data-row:hover {
  border-left-color: #55ff55;
  background: rgba(51, 255, 51, 0.05);
  transform: translateX(5px);
}

.restricted {
  color: #ff3333;
  font-style: italic;
}

.status-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  animation: statusBlink 1s infinite;
}

.status-active {
  background: #33ff33;
}

.status-warning {
  background: #ffaa33;
  animation: statusBlink 0.5s infinite;
}

.status-alert {
  background: #ff3333;
  animation: statusBlink 0.3s infinite;
}

@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.stat-box {
  border: 1px solid #33ff33;
  padding: 10px;
  margin: 10px 0;
  background: rgba(51, 255, 51, 0.05);
  border-radius: 2px;
}

.stat-value {
  font-size: 18px;
  font-weight: bold;
  color: #33ff33;
}

.stat-label {
  font-size: 12px;
  color: #999;
  text-transform: uppercase;
  margin-top: 5px;
}

.interactive-btn {
  display: inline-block;
  padding: 5px 10px;
  margin: 5px 5px 5px 0;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s ease;
  font-family: monospace;
}

.interactive-btn:hover {
  background: #33ff33;
  color: black;
  box-shadow: 0 0 10px #33ff33;
}

.interactive-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#panel-main {
  animation: slideIn 0.5s ease;
}

.login-spinner {
  text-align: center;
  font-size: 24px;
  animation: spin 1s linear infinite;
  margin: 10px 0;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#glitch-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #050505;
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#glitch-screen.active {
  display: flex;
}

.glitch-content {
  text-align: center;
  animation: glitchFlicker 0.1s infinite;
}

@keyframes glitchFlicker {
  0%, 100% { text-shadow: 0 0 10px #ff3333, -2px 2px 0 #33ff33, 2px -2px 0 #3399ff; }
  20% { text-shadow: 2px -2px 0 #ff3333, -2px 2px 0 #33ff33, 0 0 10px #3399ff; }
  40% { text-shadow: -2px 2px 0 #ff3333, 0 0 0 #33ff33, 2px -2px 0 #3399ff; }
  60% { text-shadow: 0 0 10px #ff3333, 2px -2px 0 #33ff33, -2px 2px 0 #3399ff; }
  80% { text-shadow: -2px 2px 0 #ff3333, 2px -2px 0 #33ff33, 0 0 10px #3399ff; }
}

.glitch-text {
  font-size: 32px;
  color: #ff3333;
  margin-bottom: 20px;
  font-weight: bold;
  letter-spacing: 3px;
}

.glitch-warning {
  font-size: 14px;
  color: #ffaa33;
  margin-bottom: 30px;
  max-width: 400px;
}

.glitch-checkbox {
  margin: 20px 0;
}

.glitch-checkbox input {
  width: auto;
  margin-right: 10px;
}

.glitch-checkbox label {
  color: #33ff33;
  font-size: 12px;
}

.glitch-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.glitch-buttons button {
  width: 150px;
  padding: 10px;
  background: #33ff33;
  color: black;
  border: 1px solid #33ff33;
  cursor: pointer;
  font-weight: bold;
  font-family: monospace;
  transition: all 0.2s;
}

.glitch-buttons button:hover {
  background: #55ff55;
  box-shadow: 0 0 15px #33ff33;
}

.glitch-buttons button:disabled {
  background: #444;
  color: #666;
  cursor: not-allowed;
  opacity: 0.5;
}

.glitch-timer {
  font-size: 12px;
  color: #3399ff;
  margin-top: 20px;
}

.beta-tag {
  display: inline-block;
  padding: 2px 8px;
  background: #ffaa33;
  color: black;
  font-size: 10px;
  font-weight: bold;
  border-radius: 2px;
  margin-left: 5px;
}

.admin-table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 11px;
}

.admin-table th, .admin-table td {
  border: 1px solid #33ff33;
  padding: 8px;
  text-align: left;
  color: #33ff33;
}

.admin-table th {
  background: rgba(51, 255, 51, 0.1);
  font-weight: bold;
}

.admin-table tr:hover {
  background: rgba(51, 255, 51, 0.05);
}

.admin-select {
  background: black;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 4px;
  cursor: pointer;
}

.admin-btn {
  padding: 4px 8px;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.2s;
  font-family: monospace;
  margin: 2px;
}

.admin-btn:hover {
  background: #33ff33;
  color: black;
}

.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 15px;
  background: #0a0a0a;
  border: 1px solid #33ff33;
  color: #33ff33;
  border-radius: 2px;
  z-index: 10000;
  animation: slideInRight 0.3s ease;
}

@keyframes slideInRight {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.notification.success { border-color: #33ff33; }
.notification.error { border-color: #ff3333; }
.notification.warning { border-color: #ffaa33; }

.mission-item {
  background: rgba(51, 255, 51, 0.05);
  padding: 10px;
  margin: 8px 0;
  border-left: 3px solid #33ff33;
}

.note-input {
  width: 100%;
  height: 80px;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  box-sizing: border-box;
  margin-bottom: 10px;
  font-family: monospace;
}

.delete-btn {
  background: #ff3333 !important;
  color: white !important;
}

.delete-btn:hover {
  background: #ff5555 !important;
}

.edit-btn {
  background: #3399ff !important;
  color: white !important;
}

.edit-btn:hover {
  background: #55bbff !important;
}

.alpha-tag {
  display: inline-block;
  padding: 2px 8px;
  background: #33ff33;
  color: black;
  font-size: 10px;
  font-weight: bold;
  border-radius: 2px;
  margin-left: 5px;
}
</style>
</head>

<body>

<div id="box">
  <h2>ACCESS-X25</h2>

  <div id="login-form">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    
    <div class="button-group">
      <button onclick="login()">Connexion</button>
      <button onclick="showGlitchScreen()" style="background: #ffaa33; color: black;">S'inscrire</button>
    </div>

    <div id="log"></div>
  </div>

  <div id="panel-main" style="display: none;">
    <div class="header">
      <div class="user-info">👤 <span id="logged-user"></span></div>
      <button class="logout-btn" onclick="logout()">🚪 Déconnexion</button>
    </div>

    <div class="menu">
      <div class="module" data-module="ops" onclick="openModule(this, 'ops')">📂 Opérations</div>
      <div class="module" data-module="missions" onclick="openModule(this, 'missions')">🎯 Missions</div>
      <div class="module" data-module="intelligence" onclick="openModule(this, 'intelligence')">🔍 Intelligence</div>
      <div class="module" data-module="comms" onclick="openModule(this, 'comms')">📡 Comms</div>
      <div class="module" data-module="notes" onclick="openModule(this, 'notes')">🧠 Notes</div>
      <div class="module" data-module="logs" onclick="openModule(this, 'logs')">📋 Logs</div>
      <div class="module" data-module="profile" onclick="openModule(this, 'profile')">👥 Profil</div>
      <div class="module" data-module="settings" onclick="openModule(this, 'settings')">⚙️ Paramètres</div>
    </div>

    <div id="content"></div>
  </div>
</div>

<!-- Glitch Screen for Registration -->
<div id="glitch-screen">
  <div class="glitch-content">
    <div class="glitch-text">⚠️ DANGER ⚠️</div>
    <div class="glitch-warning">
      VOUS ÊTES SUR LE POINT D'ACCÉDER À UN SYSTÈME CLASSIFIÉ.<br>
      CETTE ACTION EST ENREGISTRÉE ET SURVEILLÉE.<br>
      CONFIRMEZ-VOUS VOTRE IDENTITÉ ?
    </div>
    
    <div class="glitch-checkbox">
      <input type="checkbox" id="accept-terms">
      <label for="accept-terms">J'accepte les conditions de sécurité</label>
    </div>
    
    <div class="glitch-buttons">
      <button onclick="sendRegistrationEmail()" id="startBtn" disabled>C'EST PARTI !</button>
      <button onclick="cancelRegistration()" style="background: #ff3333; border-color: #ff3333;">ANNULER</button>
    </div>
    
    <div class="glitch-timer">
      <span id="timer"></span>
    </div>
  </div>
</div>

<script>
let glitchTimer = null;
let registrationSent = false;

let USERS = {
  "Dr Zed": {
    pass: "aaursi",
    type: "zed",
    clearance: "ALPHA"
  },
  "Dr Melquenn": {
    pass: "melina",
    type: "ix",
    clearance: "BETA"
  }
};

// Data storage for missions, notes, etc
let userData = {};

let attempts = 0;
let currentUser = null;
let currentType = null;
let currentClearance = null;
let currentModule = null;

// Initialize storage
function initStorage() {
  const stored = localStorage.getItem('accessX25Data');
  if (stored) {
    try {
      const data = JSON.parse(stored);
      USERS = data.users || USERS;
      userData = data.userdata || {};
    } catch (e) {
      console.error('Storage error:', e);
    }
  }
  ensureUserData();
}

function ensureUserData() {
  if (!userData[currentUser]) {
    userData[currentUser] = {
      missions: [],
      notes: [],
      completedMissions: 0,
      missionsData: {
        "MISSION-Δ19": { progress: 60, state: "ACTIVE" },
        "MISSION-VX-SHADOW": { progress: 35, state: "EN COURS" },
        "MISSION-SURVEY-08": { progress: 0, state: "À FAIRE" },
        "MISSION-ZED-01": { progress: 100, state: "ACTIVE" },
        "MISSION-ALPHA-05": { progress: 45, state: "ACTIVE" }
      }
    };
  }
}

function saveStorage() {
  localStorage.setItem('accessX25Data', JSON.stringify({
    users: USERS,
    userdata: userData
  }));
}

function showNotification(message, type = 'success') {
  const notif = document.createElement('div');
  notif.className = `notification ${type}`;
  notif.textContent = message;
  document.body.appendChild(notif);
  
  setTimeout(() => {
    notif.style.animation = 'slideInRight 0.3s ease reverse';
    setTimeout(() => notif.remove(), 300);
  }, 3000);
}

function showGlitchScreen() {
  const glitchScreen = document.getElementById('glitch-screen');
  glitchScreen.classList.add('active');
  
  document.getElementById('accept-terms').checked = false;
  document.getElementById('startBtn').disabled = true;
  registrationSent = false;
  
  let timeLeft = 5;
  updateTimer(timeLeft);
  
  glitchTimer = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    
    if (timeLeft <= 0) {
      clearInterval(glitchTimer);
      document.getElementById('startBtn').disabled = false;
    }
  }, 1000);
}

function updateTimer(timeLeft) {
  if (timeLeft > 0) {
    document.getElementById('timer').textContent = `Accès disponible dans: ${timeLeft}s`;
  } else {
    document.getElementById('timer').textContent = `✓ Vous pouvez procéder`;
  }
}

function cancelRegistration() {
  document.getElementById('glitch-screen').classList.remove('active');
  if (glitchTimer) clearInterval(glitchTimer);
}

function sendRegistrationEmail() {
  if (!document.getElementById('accept-terms').checked) {
    alert('Vous devez accepter les conditions');
    return;
  }
  
  registrationSent = true;
  window.location.href = 'mailto:niz-official1@proton.me?subject=Demande d\'accès ACCESS-X25&body=Je souhaite accéder au système ACCESS-X25.%0A%0AEn attente de validation par Dr Zed.';
  
  setTimeout(() => {
    document.getElementById('glitch-screen').classList.remove('active');
    document.getElementById('log').innerHTML = "<span class='success'>✓ Demande envoyée — Dr Zed validera ta demande</span>";
    
    if (glitchTimer) clearInterval(glitchTimer);
  }, 500);
}

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;
  const log = document.getElementById("log");

  if (!u || !p) {
    log.innerHTML = "<span class='alert'>⚠️ Champs requis</span>";
    return;
  }

  log.innerHTML = "<div class='login-spinner'>⟳</div>";

  setTimeout(() => {
    if (USERS[u] && USERS[u].pass === p) {
      currentUser = u;
      currentType = USERS[u].type;
      currentClearance = USERS[u].clearance;
      ensureUserData();
      loadPanel(u, currentType);
      attempts = 0;
    } else {
      attempts++;

      if (attempts === 1) {
        log.innerHTML = "<span class='alert'>⚠️ Analyse en cours...</span>";
      } else if (attempts === 2) {
        log.innerHTML = "<span class='alert'>⚠️ Anomalie comportementale détectée.</span>";
      } else {
        log.innerHTML = "<span class='alert'>🔒 Session surveillée — VX</span>";
      }
    }
  }, 1500);
}

function logout() {
  saveStorage();
  document.getElementById("login-form").style.display = "block";
  document.getElementById("panel-main").style.display = "none";
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  document.getElementById("log").innerHTML = "";
  currentUser = null;
  currentType = null;
  currentClearance = null;
  currentModule = null;
  attempts = 0;
  
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
}

function loadPanel(user, type) {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("panel-main").style.display = "block";
  const clearanceText = USERS[user].clearance === "BETA" ? `${USERS[user].clearance} <span class='beta-tag'>ACCÈS LIMITÉ</span>` : USERS[user].clearance;
  document.getElementById("logged-user").innerHTML = user + " [" + clearanceText + "]";
  
  setTimeout(() => {
    const firstModule = document.querySelector('.module');
    openModule(firstModule, 'ops');
  }, 300);
}

function updateMissionProgress(missionId, newProgress) {
  if (userData[currentUser].missionsData[missionId]) {
    userData[currentUser].missionsData[missionId].progress = newProgress;
    saveStorage();
  }
}

function completeMission(missionId) {
  if (userData[currentUser].missionsData[missionId]) {
    userData[currentUser].missionsData[missionId].progress = 100;
    userData[currentUser].missionsData[missionId].state = "COMPLÉTÉE";
    userData[currentUser].completedMissions = (userData[currentUser].completedMissions || 0) + 1;
    saveStorage();
    showNotification(`Mission ${missionId} complétée!`, 'success');
  }
}

function addNote(content) {
  if (!content.trim()) {
    showNotification('Note vide!', 'warning');
    return;
  }
  userData[currentUser].notes.push({
    id: Date.now(),
    content: content,
    timestamp: new Date().toLocaleString('fr-FR')
  });
  saveStorage();
  showNotification('Note ajoutée', 'success');
  openModule(document.querySelector('[data-module="notes"]'), 'notes');
}

function deleteNote(noteId) {
  userData[currentUser].notes = userData[currentUser].notes.filter(n => n.id !== noteId);
  saveStorage();
  showNotification('Note supprimée', 'success');
  openModule(document.querySelector('[data-module="notes"]'), 'notes');
}

function sendMessage(recipient) {
  showNotification(`Message envoyé à ${recipient}`, 'success');
}

function changeClearance(username, newClearance) {
  if (USERS[username]) {
    USERS[username].clearance = newClearance;
    saveStorage();
    showNotification(`Clearance de ${username} changée à ${newClearance}`, 'success');
    openModule(document.querySelector('[data-module="settings"]'), 'settings');
  }
}

function deleteUser(username) {
  if (username === currentUser) {
    showNotification('Impossible de supprimer le compte actuel', 'error');
    return;
  }
  if (username === "Dr Zed") {
    showNotification('Impossible de supprimer Dr Zed', 'error');
    return;
  }
  delete USERS[username];
  if (userData[username]) delete userData[username];
  saveStorage();
  showNotification(`Utilisateur ${username} supprimé`, 'success');
  openModule(document.querySelector('[data-module="settings"]'), 'settings');
}

function openModule(element, mod) {
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  
  if (element) element.classList.add('active');
  
  currentModule = mod;
  const c = document.getElementById("content");
  
  c.innerHTML = '';

  if (mod === "ops") {
    let ops = "<div class='section-title'>📂 OPÉRATIONS EN COURS</div>";
    ops += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>OP-442</span> : Surveillance Point A - <span class='success'>ACTIVE</span></div>";
    ops += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>OP-778</span> : Analyse VX - <span class='success'>ACTIVE</span></div>";
    ops += "<div class='data-row'><span class='status-indicator status-warning'></span><span class='info'>OP-990</span> : Accès restreint - " + 
           (currentClearance === "ALPHA" ? "<span class='success'>DÉBLOQUÉ</span>" : "<span class='restricted'>CLASSIFIÉ</span>") + "</div>";

    ops += "<div class='stat-box'>";
    ops += "<div class='stat-label'>Opérations Actives</div>";
    ops += "<div class='stat-value'>" + (currentClearance === "ALPHA" ? "7 / 12" : "4 / 12") + "</div>";
    ops += "</div>";
    
    if (currentClearance === "ALPHA") {
      ops += "<div class='data-row' style='margin-top: 10px; border-left-color: #ffaa33;'><span class='status-indicator status-alert'></span><span class='warning'>[CLASSIFIÉ]</span> OP-VX-CORE : Intégration Avancée</div>";

      ops += "<div class='stat-value'>ACCÈS COMPLET</div>";
      ops += "</div>";
    } else {
      ops += "<div class='stat-box'>";
      ops += "<div class='stat-label'>Clearance BETA</div>";
      ops += "<div class='stat-value'>ACCÈS PARTIEL</div>";
      ops += "</div>";
    }
    
    c.innerHTML = ops;
  }

  else if (mod === "missions") {
    let missions = "<div class='section-title'>🎯 MISSIONS ASSIGNÉES</div>";
    
    const missionsData = userData[currentUser].missionsData;

      missions += "Priorité : <span class='alert'>CRITIQUE</span><br>";
      missions += "Cible : Analyse VX-CORE<br>";
      missions += "Progression : <span class='success'>" + missionsData["MISSION-Δ19"].progress + "%</span><br>";
      missions += "<button class='interactive-btn' onclick='updateMissionProgress(\"MISSION-Δ19\", Math.min(100, " + (missionsData["MISSION-Δ19"].progress + 10) + "))'>Progression +10%</button>";
      missions += "<button class='interactive-btn' onclick='completeMission(\"MISSION-Δ19\")'>Valider</button>";
      missions += "</div>";
      
      missions += "<div class='mission-item'>";
      missions += "<strong>MISSION-VX-SHADOW</strong><br>";
      missions += "État : <span class='warning'>" + missionsData["MISSION-VX-SHADOW"].state + "</span><br>";
      missions += "Priorité : <span class='warning'>HAUTE</span><br>";
      missions += "Détails : <span class='restricted'>[ DONNÉES CHIFFRÉES ]</span><br>";
      missions += "Progression : <span class='warning'>" + missionsData["MISSION-VX-SHADOW"].progress + "%</span><br>";
      missions += "<button class='interactive-btn' onclick='updateMissionProgress(\"MISSION-VX-SHADOW\", Math.min(100, " + (missionsData["MISSION-VX-SHADOW"].progress + 10) + "))'>Déchiffrer</button>";

      missions += "</div>";
      
      missions += "<div class='mission-item'>";
      missions += "<strong>MISSION-SURVEY-08</strong><br>";
      missions += "État : <span class='info'>" + missionsData["MISSION-SURVEY-08"].state + "</span><br>";
      missions += "Priorité : <span class='info'>NORMALE</span><br>";
      missions += "Cible : Inspection Zone Theta<br>";
      missions += "<button class='interactive-btn' onclick='updateMissionProgress(\"MISSION-SURVEY-08\", Math.min(100, " + (missionsData["MISSION-SURVEY-08"].progress + 25) + ")); updateMissionProgress(\"MISSION-SURVEY-08\", 100);'>Accepter</button>";
      missions += "</div>";
    } else {
      missions += "<div class='mission-item'>";
      missions += "<strong>MISSION-ZED-01</strong><br>";
      missions += "État : <span class='success'>" + missionsData["MISSION-ZED-01"].state + "</span><br>";
      missions += "Priorité : <span class='info'>NORMALE</span><br>";
      missions += "Sujet : Maintien Protocole Point A<br>";
      missions += "Progression : <span class='success'>" + missionsData["MISSION-ZED-01"].progress + "%</span><br>";
      missions += "<button class='interactive-btn' onclick='alert(\"Statut du système: OK\")'>Vérifier</button>";
      missions += "<button class='interactive-btn' onclick='completeMission(\"MISSION-ZED-01\")'>Rapport</button>";
      missions += "</div>";
      
      missions += "<div class='mission-item'>";
      missions += "<strong>MISSION-ALPHA-05</strong><br>";
      missions += "État : <span class='success'>" + missionsData["MISSION-ALPHA-05"].state + "</span><br>";

      missions += "Sujet : Calibration Équipement Secteur 4<br>";
      missions += "Progression : <span class='warning'>" + missionsData["MISSION-ALPHA-05"].progress + "%</span><br>";
      missions += "<button class='interactive-btn' onclick='updateMissionProgress(\"MISSION-ALPHA-05\", Math.min(100, " + (missionsData["MISSION-ALPHA-05"].progress + 15) + "))'>Continuer</button>";
      missions += "</div>";
    }
    
    missions += "<div class='stat-box'>";
    missions += "<div class='stat-label'>Missions Complétées</div>";
    missions += "<div class='stat-value'>" + (userData[currentUser].completedMissions || 0) + " / 15</div>";
    missions += "</div>";
    
    c.innerHTML = missions;
  }

    if (currentClearance === "ALPHA") {
      intel += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>INTEL-001</span>";
      intel += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      intel += "Sujet : Activité anormale Secteur 7<br>";
      intel += "Statut : <span class='warning'>EN INVESTIGATION</span><br>";
      intel += "Importance : <span class='alert'>CRITIQUE</span><br>";
      intel += "Source : Sensors réseau<br>";
      intel += "<button class='interactive-btn' onclick='showNotification(\"Fluctuations électromagnétiques détectées à 2300 heures UTC\")'>Analyser</button>";
      intel += "</div></div>";
      
      intel += "<div class='data-row'><span class='status-indicator status-active'></span><span class='info'>INTEL-VX-PATTERN</span>";
      intel += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      intel += "Sujet : Schéma de communication VX<br>";
      intel += "Statut : <span class='success'>DÉCODÉ</span><br>";
      intel += "Implications : <span class='alert'>MAJEURE</span><br>";
      intel += "Type : Échange de données sécurisées<br>";
      intel += "<button class='interactive-btn' onclick='showNotification(\"VX utilise des canaux auxiliaires invisibles\")'>Détails</button>";
      intel += "</div></div>";
    } else {
      intel += "<div class='data-row'><span class='restricted'>ACCÈS RESTREINT</span>";
      intel += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      intel += "Clearance BETA insuffisante pour accéder aux renseignements classifiés.<br>";
      intel += "<span class='warning'>⚠ Votre accès est limité</span>";
      intel += "</div></div>";
      
      intel += "<div class='stat-box'>";
      intel += "<div class='stat-label'>Demande de déblocage</div>";
      intel += "<div class='stat-value'>NON AUTORISÉ</div>";
      intel += "</div>";
    }
    
    c.innerHTML = intel;
  }

  else if (mod === "comms") {
    let comms = "<div class='section-title'>📡 COMMUNICATIONS</div>";
    
    if (currentType === "zed") {
      comms += "<div class='data-row'><span class='status-indicator status-active'></span><span class='warning'>[ENCRYPTED]</span> Message de Dr Ix";
      comms += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      comms += "Timestamp : 14/03/2026 14:32:15<br>";
      comms += "Message : <span class='restricted'>███████████ Point A ███████████</span><br>";
      comms += "<button class='interactive-btn' onclick='showNotification(\"Déchiffrement: Les portes réagissent aux intentions\")'>Déchiffrer</button>";
      comms += "<button class='interactive-btn' onclick='sendMessage(\"Dr Melquenn\")'>Répondre</button>";
      comms += "</div></div>";
      
      comms += "<div class='data-row'><span class='status-indicator status-active'></span>Broadcast Système";
      comms += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      comms += "De : VX-CORE<br>";
      comms += "Timestamp : 14/03/2026 13:05:00<br>";
      comms += "Contenu : <span class='success'>Système nominal — Tous les services opérationnels</span><br>";
      comms += "<button class='interactive-btn' onclick='showNotification(\"Statut du système: OK\")'>Statut</button>";
      comms += "</div></div>";
    } else {
      comms += "<div class='data-row'><span class='status-indicator status-active'></span>Communications limitées";
      comms += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      comms += "Clearance BETA : Communications restreintes<br>";
      comms += "<button class='interactive-btn' onclick='sendMessage(\"Admin\")'>Envoyer Support</button>";
      comms += "</div></div>";
    }
    
    c.innerHTML = comms;
  }

  else if (mod === "notes") {
    let notes = "<div class='section-title'>🧠 NOTES INTERNES</div>";
    
    if (currentType === "zed") {
      notes += "<textarea class='note-input' id='new-note' placeholder='Ajouter une nouvelle note...'></textarea>";
      notes += "<button class='interactive-btn' onclick='addNote(document.getElementById(\"new-note\").value)'>Ajouter Note</button><br>";
    }
    
    if (userData[currentUser].notes && userData[currentUser].notes.length > 0) {
      userData[currentUser].notes.forEach(note => {
        notes += "<div class='data-row'>";
        notes += "<div style='margin: 5px 0;'>" + note.content + "</div>";
        notes += "<div style='font-size: 10px; color: #999;'>" + note.timestamp + "</div>";
        notes += "<button class='interactive-btn delete-btn' onclick='deleteNote(" + note.id + ")'>Supprimer</button>";
        notes += "</div>";
      });
    } else {
      notes += "<div class='data-row'><span class='info'>Aucune note pour le moment</span></div>";
    }
    
    c.innerHTML = notes;
  }

  else if (mod === "logs") {
    let logs = "<div class='section-title'>📋 LOGS SYSTÈME</div>";
    logs += "<div style='font-size: 11px; color: #666;'>";
    
    if (currentType === "zed") {
      logs += "<div class='data-row'>";
      logs += "[ZED.LOG - " + new Date().toLocaleString('fr-FR') + "]<br>";
      logs += "Connexion établie<br>";
      logs += "Statut : <span class='success'>ACTIVE</span><br>";
      logs += "</div>";
    } else {
      logs += "<div class='data-row'>";
      logs += "[IX.LOG - " + new Date().toLocaleString('fr-FR') + "]<br>";
      logs += "Opération validée<br>";
      logs += "Statut : <span class='success'>OK</span>";
      logs += "</div>";
    }
    
    logs += "</div>";
    c.innerHTML = logs;
  }

  else if (mod === "profile") {
    let profile = "<div class='section-title'>👥 PROFIL UTILISATEUR</div>";
    
    profile += "<div class='stat-box'>";
    profile += "<div class='stat-label'>Identité</div>";
    profile += "<div class='stat-value'>" + currentUser + "</div>";
    profile += "</div>";
    
    profile += "<div class='stat-box'>";
    profile += "<div class='stat-label'>Clearance Level</div>";
    profile += "<div class='stat-value'>" + currentClearance + "</div>";
    profile += "</div>";
    
    profile += "<div class='stat-box'>";
    profile += "<div class='stat-label'>Type d'Accès</div>";
    profile += "<div class='stat-value'>" + (currentType === "zed" ? "Administrateur" : "Opérateur") + "</div>";
    profile += "</div>";
    
    profile += "<div class='stat-box'>";
    profile += "<div class='stat-label'>Sessions Actives</div>";
    profile += "<div class='stat-value'>1</div>";
    profile += "</div>";
    
    profile += "<div class='data-row' style='margin-top: 20px;'>";
    profile += "<span class='info'>Modules disponibles :</span><br>";
    profile += "<div style='margin-left: 15px; margin-top: 10px; font-size: 11px;'>";
    
    if (currentClearance === "ALPHA") {
      profile += "✓ Opérations<br>";
      profile += "✓ Missions<br>";
      profile += "✓ Intelligence<br>";
      profile += "✓ Communications<br>";
      profile += "✓ Notes Internes<br>";
      profile += "✓ Logs Système<br>";
      profile += "✓ Profil<br>";
      profile += "✓ Paramètres (ACCÈS COMPLET)<br>";
    } else {
      profile += "✓ Opérations (accès limité)<br>";
      profile += "✓ Missions<br>";
      profile += "✗ Intelligence (verrouillé)<br>";
      profile += "✓ Communications (messages génériques)<br>";
      profile += "✓ Notes Internes (consultation)<br>";
      profile += "✓ Logs Système<br>";
      profile += "✓ Profil<br>";
      profile += "✗ Paramètres (verrouillé)<br>";
    }
    
    profile += "</div></div>";
    
    c.innerHTML = profile;
  }

  else if (mod === "settings") {
    let settings = "<div class='section-title'>⚙️ PARAMÈTRES</div>";
    
    if (currentType === "zed") {
      settings += "<div class='section-title' style='color: #ff3333; border-color: #ff3333; margin-top: 20px;'>🔴 ADMIN DASHBOARD</div>";
      settings += "<div style='font-size: 12px; margin-bottom: 15px;'>";
      settings += "Gestion des utilisateurs et des clearances<br>";
      settings += "</div>";
      
      settings += "<table class='admin-table'>";
      settings += "<tr><th>Utilisateur</th><th>Type</th><th>Clearance</th><th>Actions</th></tr>";
      
      for (let user in USERS) {
        settings += "<tr>";
        settings += "<td>" + user + "</td>";
        settings += "<td>" + (USERS[user].type === 'zed' ? 'Admin' : 'Opérateur') + "</td>";
        settings += "<td>";
        settings += "<select class='admin-select' id='clear-" + user + "'>";
        settings += "<option value='ALPHA'" + (USERS[user].clearance === 'ALPHA' ? ' selected' : '') + ">ALPHA</option>";
        settings += "<option value='BETA'" + (USERS[user].clearance === 'BETA' ? ' selected' : '') + ">BETA</option>";
        settings += "</select>";
        settings += "</td>";
        settings += "<td>";
        if (user !== "Dr Zed") {
          settings += "<button class='admin-btn' onclick='changeClearance(\"" + user + "\", document.getElementById(\"clear-" + user + "\").value)'>Appliquer</button>";
          settings += "<button class='admin-btn delete-btn' onclick='deleteUser(\"" + user + "\")'>Supprimer</button>";
        } else {
          settings += "<span class='alpha-tag'>PROPRIÉTAIRE</span>";
        }
        settings += "</td>";
        settings += "</tr>";
      }
      
      settings += "</table>";
      
      settings += "<div class='stat-box' style='margin-top: 20px;'>";
      settings += "<div class='stat-label'>Utilisateurs Actifs</div>";
      settings += "<div class='stat-value'>" + Object.keys(USERS).length + "</div>";
      settings += "</div>";
    } else {
      settings += "<div class='data-row'>";
      settings += "<span class='restricted'>ACCÈS RESTREINT</span>";
      settings += "<div style='margin-left: 15px; margin-top: 5px; font-size: 12px;'>";
      settings += "Vous n'avez pas accès aux paramètres système.<br>";
      settings += "Seul l'administrateur peut gérer les utilisateurs.";
      settings += "</div></div>";
    }
    
    c.innerHTML = settings;
  }
}

window.addEventListener('load', () => {
  initStorage();
});
</script>
