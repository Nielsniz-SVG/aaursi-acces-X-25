<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AAURSI • ACCESS-X25</title>

<style>
body {
  background: #050505;
  color: #33ff33;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#box {
  width: 500px;
  border: 1px solid #33ff33;
  padding: 20px;
}

h2 { text-align: center; }

input {
  width: 100%;
  background: black;
  border: 1px solid #33ff33;
  color: #33ff33;
  padding: 8px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  background: #33ff33;
  color: black;
  border: none;
  padding: 8px;
  cursor: pointer;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.module {
  border: 1px solid #33ff33;
  padding: 10px;
  cursor: pointer;
}

#content {
  margin-top: 15px;
  white-space: pre-wrap;
}

.alert { color: red; }
</style>
</head>

<body>

<div id="box">
  <h2>ACCESS-X25</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Connexion</button>

  <div id="log"></div>
</div>

<script>
const USERS = {
  "Dr Zed": {
    pass: "wxcsd54",
    type: "zed"
  },
  "Dr Ix": {
    pass: "mmopl96",
    type: "ix"
  }
};

let attempts = 0;

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;
  const log = document.getElementById("log");

  setTimeout(() => {

    if (USERS[u] && USERS[u].pass === p) {
      loadPanel(u, USERS[u].type);
    } else {
      attempts++;

      if (attempts === 1) {
        log.innerHTML = "<span class='alert'>Analyse en cours...</span>";
      } else if (attempts === 2) {
        log.innerHTML = "<span class='alert'>Anomalie comportementale détectée.</span>";
      } else {
        log.innerHTML = "<span class='alert'>Session surveillée — VX</span>";
      }
    }

  }, 1000);
}

function loadPanel(user, type) {
  document.getElementById("box").innerHTML = `
    <h2>CENTRE AAURSI</h2>
    <div>Connecté : ${user}</div>

    <div class="menu">
      <div class="module" onclick="openModule('ops')">📂 Opérations</div>
      <div class="module" onclick="openModule('missions')">🎯 Missions</div>
      <div class="module" onclick="openModule('notes')">🧠 Notes</div>
      <div class="module" onclick="openModule('logs')">📡 Logs</div>
    </div>

    <div id="content"></div>
  `;

  window.userType = type;
}

function openModule(mod) {
  const c = document.getElementById("content");

  if (mod === "ops") {
    c.textContent =
      "OP-442 : Surveillance Point A\n" +
      "OP-778 : Analyse VX\n" +
      "OP-990 : Accès restreint";
  }

  if (mod === "missions") {
    if (userType === "ix") {
      c.textContent =
        "Mission Δ19 : ACTIVE\n" +
        "Mission VX-CORE : CLASSIFIÉE";
    } else {
      c.textContent =
        "Accès partiel.\nDonnées masquées.";
    }
  }

  if (mod === "notes") {
    if (userType === "zed") {
      c.textContent =
        "Le Point A réagit au langage.\n" +
        "Ce n’est pas une zone.\n" +
        "C’est une interface.";
    } else {
      c.textContent =
        "Notes indisponibles.";
    }
  }

  if (mod === "logs") {
    if (userType === "zed") {
      c.textContent =
        "[ZED.LOG]\nSignal instable.\nVX présent.";
    } else {
      c.textContent =
        "[IX.LOG]\nOpération validée.\nDossier effacé.";
    }
  }
}
</script>

</body>
</html>
